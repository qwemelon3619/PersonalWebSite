version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: blog_db
      POSTGRES_USER: blog_user
      POSTGRES_PASSWORD: blog_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - blog_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blog_user -d blog_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - blog_network

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    command: "azurite-blob --blobHost 0.0.0.0 --loose --skipApiVersionCheck"
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    volumes:
      - azurite_data:/data
    networks:
      - blog_network

  auth-service:
    env_file:
      - .env.dev
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
      target: dev
    environment:
      - POSTGRE_CONNECTION_STRING=host=postgres user=blog_user password=blog_password dbname=blog_db port=5432 sslmode=disable TimeZone=Asia/Seoul
      - REDIS_DB_URL=redis
      - REDIS_DB_PORT=6379
      - REDIS_DB_PASSWORD=
      - JWT_SECRET_KEY=your-jwt-secret
      - SERVER_PORT=8081
      - MYDOMAIN=http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/app
    networks:
      - blog_network

  post-service:
    env_file:
      - .env.dev
    build:
      context: .
      dockerfile: services/post-service/Dockerfile
      target: dev
    environment:
      - POSTGRE_CONNECTION_STRING=host=postgres user=blog_user password=blog_password dbname=blog_db port=5432 sslmode=disable TimeZone=Asia/Seoul
      - REDIS_DB_URL=redis
      - REDIS_DB_PORT=6379
      - REDIS_DB_PASSWORD=
      - IMAGE_SERVICE_URL=http://img-service:8083
      - SERVER_PORT=8082
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/app
    networks:
      - blog_network

  img-service:
    env_file:
      - .env.dev
    build:
      context: .
      dockerfile: services/img-service/Dockerfile
      target: dev
    environment:
      - AZURE_STORAGE_CONNECTION_STRING=DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;
      - BLOB_CONTAINER_NAME=blogcontainer
      - BLOB_ACCOUNT_NAME=devstoreaccount1
      - SERVER_PORT=8083
    depends_on:
      - azurite
    volumes:
      - .:/app
    networks:
      - blog_network

  api-gateway:
    env_file:
      - .env.dev
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
      target: dev
    environment:
      - AUTH_SERVICE_URL=http://auth-service:8081
      - POST_SERVICE_URL=http://post-service:8082
      - IMG_SERVICE_URL=http://img-service:8083
      - SERVER_PORT=8080
      - JWT_SECRET_KEY=your-jwt-secret
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - post-service
    volumes:
      - .:/app
    networks:
      - blog_network

  web-front:
    env_file:
      - .env.dev
    build:
      context: .
      dockerfile: services/web-front/Dockerfile
      target: dev
    environment:
      - API_GATEWAY_URL=http://api-gateway:8080
      - IMAGE_BASE_URL=/img/
      - SERVER_PORT=3001
      - MYDOMAIN=http://localhost:3000
    ports:
      - "3001:3001"
    depends_on:
      - api-gateway
    volumes:
      - .:/app
    networks:
      - blog_network

  nginx:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web-front
      - azurite
    networks:
      - blog_network

volumes:
  postgres_data:
  azurite_data:

networks:
  blog_network:
    driver: bridge
